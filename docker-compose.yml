services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: rag_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_assistant}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./python-services/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-rag_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rag_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag_network

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: rag_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - PYTHON_SERVICE_API_KEY=${PYTHON_SERVICE_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
    depends_on:
      - postgres
      - redis
    networks:
      - rag_network

  # Python FastAPI Backend (document processing + API)
  python-service:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    container_name: rag_python_service
    ports:
      - "8001:8001"
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rag_assistant}
      - REDIS_URL=redis://redis:6379
      - PYTHON_SERVICE_API_KEY=${PYTHON_SERVICE_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./python-services:/app
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - rag_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8001
    depends_on:
      - python-service
    networks:
      - rag_network

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  rag_network:
    driver: bridge
